name: Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # No registry-url: it writes an _authToken line into .npmrc that blocks
      # OIDC trusted publishing. Without it, npm falls through to OIDC.
      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install
        run: bun install --frozen-lockfile

      - name: Typecheck and lint
        run: |
          bun run typecheck
          bun run lint

      # Trusted publishing: no NPM_TOKEN. GitHub mints a short-lived OIDC
      # credential per run; provenance is attached automatically. Requires a
      # trusted publisher configured on npmjs.com for this package + workflow,
      # and npm >= 11.5.1.
      - name: Publish to npm (OIDC trusted publishing)
        working-directory: packages/eve-channel-sendblue
        run: |
          npm install -g npm@latest
          npm publish --access public
